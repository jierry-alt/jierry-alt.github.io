<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡ Eternity. 音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #c026d3, #7e22ce, #3b82f6);
            min-height: 100vh;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .album {
            width: 260px;
            height: 260px;
            border-radius: 9999px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            animation: spin 25s linear infinite paused;
        }
        .playing .album { animation-play-state: running; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .progress { accent-color: #ec4899; }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="max-w-md mx-auto pt-8 px-4">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-white tracking-tighter">♡ Eternity.</h1>
            <p class="text-white/80 mt-1">沉浸式聆听体验</p>
        </div>

        <!-- 主播放界面 -->
        <div v-if="currentSong" class="glass rounded-3xl p-8 text-center playing">
            <img :src="currentSong.cover" class="album mx-auto mb-8" 
                 @error="currentSong.cover = 'https://picsum.photos/id/1015/600/600'">

            <h2 class="text-2xl font-semibold text-gray-800">{{ currentSong.name }}</h2>
            <p class="text-gray-600 mt-1">{{ currentSong.artist }}</p>

            <div class="mt-10 mb-8">
                <input type="range" v-model="progress" class="progress w-full" @input="seek">
                <div class="flex justify-between text-xs text-gray-500 mt-2">
                    <span>{{ formatTime(currentTime) }}</span>
                    <span>{{ formatTime(duration) }}</span>
                </div>
            </div>

            <div class="flex items-center justify-center gap-12 text-4xl text-gray-700">
                <button @click="playPrev">⏮</button>
                <button @click="togglePlay" 
                        class="w-20 h-20 bg-gradient-to-br from-pink-500 to-purple-500 rounded-full flex items-center justify-center text-white shadow-xl active:scale-95 transition">
                    {{ isPlaying ? '❚❚' : '▶' }}
                </button>
                <button @click="playNext">⏭</button>
            </div>
        </div>

        <!-- 搜索和列表区域（可自行补充你之前的搜索代码） -->
        <div class="mt-10 glass rounded-3xl p-6">
            <p class="text-center text-gray-500 text-sm">你的推荐歌曲</p>
            <!-- 这里放你的 recommendedSongs 列表，点击即可播放 -->
        </div>
    </div>

    <!-- 底部迷你播放条 -->
    <div v-if="currentSong" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-white/70 max-w-md mx-auto">
        <div class="flex items-center gap-4 px-4 py-3">
            <img :src="currentSong.cover" class="w-12 h-12 rounded-2xl object-cover">
            <div class="flex-1 truncate">
                <div class="font-medium text-sm">{{ currentSong.name }}</div>
                <div class="text-xs text-gray-500">{{ currentSong.artist }}</div>
            </div>
            <button @click="togglePlay" class="text-3xl text-purple-600">
                {{ isPlaying ? '❚❚' : '▶' }}
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const currentSong = ref(null);
                const isPlaying = ref(false);
                const progress = ref(0);
                const currentTime = ref(0);
                const duration = ref(0);
                let audio = null;

                const recommendedSongs = ref([
                    { name: "嘎嘎", artist: "未知歌手", url: "https://files.catbox.moe/yjarpu.flac", cover: "https://picsum.photos/id/1015/600/600" },
                    // 继续放你其余的歌曲...
                ]);

                const initAudio = () => {
                    if (audio) audio.pause();
                    audio = new Audio();
                    audio.onloadedmetadata = () => duration.value = Math.floor(audio.duration) || 0;
                    audio.ontimeupdate = () => {
                        currentTime.value = Math.floor(audio.currentTime);
                        progress.value = duration.value ? (audio.currentTime / duration.value) * 100 : 0;
                    };
                    audio.onended = playNext;
                };

                const playSong = (song) => {
                    currentSong.value = song;
                    initAudio();
                    audio.src = song.url;
                    audio.play().then(() => isPlaying.value = true);
                };

                const togglePlay = () => {
                    if (!audio) return;
                    if (isPlaying.value) {
                        audio.pause();
                        isPlaying.value = false;
                    } else {
                        audio.play();
                        isPlaying.value = true;
                    }
                };

                const playNext = () => {
                    // 简单循环播放推荐列表
                    const idx = recommendedSongs.value.findIndex(s => s.name === currentSong.value?.name);
                    const next = recommendedSongs.value[(idx + 1) % recommendedSongs.value.length];
                    playSong(next);
                };

                const playPrev = () => {
                    const idx = recommendedSongs.value.findIndex(s => s.name === currentSong.value?.name);
                    const prev = recommendedSongs.value[(idx - 1 + recommendedSongs.value.length) % recommendedSongs.value.length];
                    playSong(prev);
                };

                const seek = () => {
                    if (audio && duration.value) audio.currentTime = (progress.value / 100) * duration.value;
                };

                const formatTime = (sec) => {
                    if (!sec) return "0:00";
                    const m = Math.floor(sec / 60);
                    const s = sec % 60;
                    return `${m}:${s < 10 ? '0' : ''}${s}`;
                };

                // 默认播放第一首
                onMounted(() => {
                    setTimeout(() => playSong(recommendedSongs.value[0]), 300);
                });

                return {
                    currentSong, isPlaying, progress, currentTime, duration,
                    recommendedSongs, togglePlay, playNext, playPrev, seek, formatTime, playSong
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
