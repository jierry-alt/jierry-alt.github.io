<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>二宝子音乐| 二宝子专属</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #3b0764 0%, #6b21a8 40%, #9f1239 75%, #be185d 100%);
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* 雪花 */
        .snowflake {
            position: absolute;
            top: -25px;
            color: #f3e8ff;
            font-size: 15px;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: snowfall linear infinite;
            opacity: 0.9;
        }
        @keyframes snowfall {
            to { transform: translateY(115vh); }
        }

        /* 跑马灯 */
        .marquee-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(12px);
            z-index: 100;
            overflow: hidden;
            padding: 10px 0;
            border-bottom: 1px solid rgba(236, 72, 153, 0.3);
        }
        .marquee {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 22s linear infinite;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(236, 72, 153, 0.9);
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.11);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
        }

        .title {
            font-size: 2.15rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, #f472b6, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .song-list {
            max-height: 355px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #e879f9 #6b21a8;
        }

        .song-item:hover {
            background: rgba(236, 72, 153, 0.28);
        }
    </style>
</head>
<body>
    <div id="snow-container" class="fixed inset-0 pointer-events-none z-10"></div>

    <!-- 跑马灯（真正平滑滚动） -->
    <div class="marquee-container">
        <div class="marquee">
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>
    </div>

    <div id="app" class="relative z-20 max-w-lg mx-auto px-4 pt-16 pb-8">

        <!-- 主标题 -->
        <div class="text-center mb-6">
            <h1 class="title">二宝子音乐网</h1>
            <p class="text-purple-200 text-sm mt-1 tracking-wider">二宝子专属 · 无损音源</p>
        </div>

        <!-- 音源选择 -->
        <div class="glass rounded-3xl p-5 mb-6">
            <div class="flex items-center gap-2 mb-3 text-sm text-purple-200">
                <span class="w-2.5 h-2.5 bg-pink-400 rounded-full animate-pulse"></span>
                音源选择
            </div>
            
            <button class="w-full py-4 rounded-2xl font-bold text-lg mb-5 bg-gradient-to-r from-pink-500 via-purple-500 to-violet-600 flex items-center justify-center gap-3 shadow-xl">
                👑 二宝子SVIP音源
            </button>

            <div class="flex gap-3">
                <div class="flex-1 relative">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-xl">🔍</div>
                    <input v-model="keyword" @keyup.enter="searchMusic"
                           type="text" placeholder="输入歌名或歌手"
                           class="w-full pl-12 pr-5 py-3.5 bg-white/10 border border-white/25 rounded-2xl text-white placeholder-purple-300 outline-none focus:border-pink-400 text-base">
                </div>
                <button @click="searchMusic" :disabled="loading"
                        class="bg-gradient-to-r from-purple-600 to-pink-600 px-8 rounded-2xl font-medium flex items-center">
                    <span v-if="loading" class="w-6 h-6 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
                    <span v-else>搜索</span>
                </button>
            </div>
        </div>

        <!-- 当前播放 -->
        <div v-if="currentSong" class="glass rounded-3xl p-5 mb-6">
            <div class="flex gap-4">
                <img :src="currentSong.artwork" class="w-20 h-20 rounded-2xl object-cover shadow-md" 
                     @error="currentSong.artwork = defaultCover">
                <div class="flex-1">
                    <div class="font-semibold text-lg leading-tight truncate">{{ currentSong.title }}</div>
                    <div class="text-purple-200 text-base mt-1">{{ currentSong.artist }}</div>
                    <audio :src="currentPlayUrl" controls autoplay class="w-full mt-4 rounded-xl"></audio>
                </div>
            </div>
            <button @click="downloadSong" 
                    class="mt-5 w-full py-3.5 bg-gradient-to-r from-pink-500 to-rose-500 rounded-2xl font-semibold text-base">
                ⬇️ 下载这首歌
            </button>
        </div>

        <!-- 标签切换 -->
        <div class="flex bg-white/10 rounded-3xl p-1 mb-5">
            <button @click="activeTab = 'search'" 
                    :class="activeTab === 'search' ? 'bg-white text-purple-800 font-semibold' : 'text-white'"
                    class="flex-1 py-3.5 rounded-3xl text-base transition-all">搜索结果</button>
            <button @click="activeTab = 'playlist'" 
                    :class="activeTab === 'playlist' ? 'bg-white text-purple-800 font-semibold' : 'text-white'"
                    class="flex-1 py-3.5 rounded-3xl text-base transition-all">二宝子歌单</button>
        </div>

        <!-- 搜索结果 -->
        <div v-if="activeTab === 'search'" class="glass rounded-3xl overflow-hidden mb-8">
            <div class="px-5 py-3 border-b border-white/10 text-purple-200 text-xs">搜索结果</div>
            <div class="song-list">
                <div v-if="loading" class="py-14 text-center text-purple-300">正在搜索...</div>
                <div v-else-if="songs.length === 0" class="py-14 text-center text-purple-300 text-sm">
                    输入关键词后搜索
                </div>
                <div v-else v-for="(song, i) in songs" :key="i" 
                     @click="playSong(song)"
                     class="song-item px-5 py-4 flex gap-4 border-b border-white/10 last:border-none cursor-pointer">
                    <span class="text-purple-400 w-5 text-right font-mono">{{ i+1 }}</span>
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-medium truncate">{{ song.title }}</div>
                        <div class="text-purple-200 text-sm truncate">{{ song.artist }}</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 二宝子歌单 -->
        <div v-if="activeTab === 'playlist'" class="glass rounded-3xl overflow-hidden">
            <div class="px-5 py-3 border-b border-white/10 text-purple-200 text-xs">二宝子歌单</div>
            <div class="song-list">
                <div v-for="(song, i) in playlist" :key="i" 
                     @click="playLocalSong(song)"
                     class="song-item px-5 py-4 flex gap-4 border-b border-white/10 last:border-none cursor-pointer">
                    <span class="text-purple-400 w-5 text-right font-mono">{{ i+1 }}</span>
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-medium truncate">{{ song.title }}</div>
                        <div class="text-purple-200 text-sm">二宝子</div>
                    </div>
                    <button @click.stop="downloadLocalSong(song)" 
                            class="text-xs px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl">下载</button>
                </div>
            </div>
        </div>

        <div class="text-center text-purple-300/60 text-xs mt-10">
            二宝子音乐网 · 永远为你
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';
        const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
        const urlCache = new Map();

        const localPlaylist = [
            { title: "嘎嘎", url: "https://files.catbox.moe/yjarpu.flac" },
            { title: "爱如星火", url: "https://files.catbox.moe/d5bklp.flac" },
            { title: "那一年那一天", url: "https://files.catbox.moe/fawyem.flac" },
            { title: "平凡之路", url: "https://files.catbox.moe/89l1hc.flac" },
            { title: "相濡以沫", url: "https://files.catbox.moe/0oluxu.flac" },
            { title: "不会改变", url: "https://files.catbox.moe/zsgxyr.flac" },
            { title: "朋克万岁", url: "https://files.catbox.moe/k2vbz2.flac" },
            { title: "500公里", url: "https://files.catbox.moe/gjyhqw.flac" },
            { title: "罪人", url: "https://files.catbox.moe/9p209l.flac" },
            { title: "曾经的你", url: "https://files.catbox.moe/6nm44r.flac" },
            { title: "空位", url: "https://streamshare.wireway.ch/download/yt5oyld9" }
        ];

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const activeTab = ref('search');
                const playlist = ref(localPlaylist);

                const showMsg = (msg) => {
                    // 可自行添加消息提示框
                    console.log(msg);
                };

                // 雪花
                const createSnow = () => {
                    const container = document.getElementById('snow-container');
                    for (let i = 0; i < 55; i++) {
                        const flake = document.createElement('div');
                        flake.className = 'snowflake';
                        flake.textContent = '❄︎';
                        flake.style.left = `${Math.random() * 100}vw`;
                        flake.style.animationDuration = `${Math.random() * 8 + 9}s`;
                        flake.style.animationDelay = `-${Math.random() * 15}s`;
                        container.appendChild(flake);
                        setTimeout(() => flake.remove(), 28000);
                    }
                };

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return;
                    loading.value = true;
                    songs.value = [];
                    // 这里可以接入你原来的QQ音乐搜索函数
                    setTimeout(() => {
                        songs.value = [
                            { title: "稻香", artist: "周杰伦", artwork: defaultCover },
                            { title: "晴天", artist: "周杰伦", artwork: defaultCover }
                        ];
                        loading.value = false;
                    }, 600);
                };

                const playSong = (song) => {
                    currentSong.value = song;
                    currentPlayUrl.value = "#"; // 替换为实际播放地址
                    showMsg(`正在播放：${song.title}`);
                };

                const playLocalSong = (song) => {
                    currentSong.value = { title: song.title, artist: "二宝子", artwork: defaultCover };
                    currentPlayUrl.value = song.url;
                    showMsg(`正在播放：${song.title}`);
                };

                const downloadLocalSong = (song) => {
                    const a = document.createElement('a');
                    a.href = song.url;
                    a.download = `${song.title}.flac`;
                    a.click();
                    showMsg(`开始下载：${song.title}`);
                };

                const downloadSong = () => {
                    if (currentPlayUrl.value) showMsg('下载已开始');
                };

                // 初始化
                setTimeout(() => {
                    createSnow();
                    setInterval(createSnow, 8500);
                }, 400);

                return {
                    keyword, songs, loading, currentSong, currentPlayUrl, activeTab, playlist,
                    searchMusic, playSong, playLocalSong, downloadSong, downloadLocalSong
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
