<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>♡ Eternity. 音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #ff9ef5 0%, #a78bff 40%, #7dd3fc 75%, #67e8f9 100%);
            min-height: 100vh; position: relative; color: #1f2937; padding-bottom: 120px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.7) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.55) 0%, transparent 60%);
            z-index: 0;
        }
        .marquee-container { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); 
            padding: 10px 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.65); 
        }
        .marquee { white-space: nowrap; display: inline-block; animation: marquee 25s linear infinite; padding-left: 100%; }
        .marquee a { color: #6b21a8; font-weight: 700; padding: 6px 24px; background: rgba(236,72,153,0.3); border-radius: 9999px; margin: 0 8px; font-size: 14.5px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        
        .glass-modern, .glass-card {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.85); box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .album-cover { 
            width: 160px; height: 160px; 
            animation: vinyl-spin 28s linear infinite paused; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        .playing .album-cover { animation-play-state: running; }
        @keyframes vinyl-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .glow-pulse::after { 
            content: ''; position: absolute; inset: -12px; 
            background: radial-gradient(circle, rgba(236,72,153,0.35) 0%, transparent 70%); 
            border-radius: 9999px; animation: glow 3s ease-in-out infinite; z-index: -1; 
        }
        @keyframes glow { 0%,100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } }
        
        .waveform { display: flex; align-items: flex-end; gap: 4px; height: 22px; }
        .bar { width: 3.5px; background: linear-gradient(#c026d3, #7e22ce); border-radius: 9999px; animation: soundwave 1.1s ease-in-out infinite; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.25s; height: 70%; }
        .bar:nth-child(4) { animation-delay: 0.15s; }
        @keyframes soundwave { 0%,100% { height: 35%; } 50% { height: 100%; } }
        
        .main-title { font-size: 2.15rem; line-height: 1.1; }
        .lyric-box { max-height: 70px; overflow-y: auto; font-size: 0.93rem; line-height: 1.45; color: #4b5563; text-align: center; }
        
        .playlist-item { transition: all 0.2s; }
        .playlist-item.active { background: rgba(168,85,247,0.15); border-left: 4px solid #a855f7; }
        
        .loader { width: 28px; height: 28px; border: 4px solid rgba(168,85,247,0.3); border-top-color: #c026d3; border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* GIF 图片样式 - 最底部居中 */
        .bottom-gif-container {
            margin-top: 40px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }
        .bottom-gif {
            max-width: 280px;
            width: 90%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.18);
            border: 6px solid rgba(255,255,255,0.85);
        }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="#" target="_blank">🔥 专业白嫖</a>
            <a href="#" target="_blank">🔥 专业白嫖</a>
            <a href="#" target="_blank">🔥 专业白嫖</a>
        </div>
    </div>

    <div id="app" class="relative z-10 max-w-xl mx-auto px-4 pt-20 pb-8">
        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="main-title font-bold bg-gradient-to-r from-purple-600 via-pink-500 to-cyan-500 bg-clip-text text-transparent">
                ♡ Eternity. 音乐
            </h1>
            <p class="text-gray-600 mt-1 text-sm">沉浸式音乐体验</p>
        </div>

        <!-- 搜索区域 -->
        <div class="glass-modern rounded-3xl p-6 mb-8">
            <div class="flex items-center gap-3 mb-5 text-purple-700">
                <span class="w-2.5 h-2.5 bg-pink-500 rounded-full animate-pulse"></span>
                <span class="font-medium">音质选择</span>
            </div>
            <div class="flex gap-2 mb-6 flex-wrap">
                <button v-for="q in qualities" :key="q.value"
                    @click="currentQuality = q.value; if(currentSong) refreshPlay()"
                    :class="currentQuality === q.value ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white' : 'bg-white border border-gray-200'"
                    class="flex-1 py-3 rounded-2xl text-sm font-semibold transition-all">
                    {{ q.label }}
                </button>
            </div>
            <div class="relative mb-6">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-pink-500 text-xl">🔍</div>
                <input v-model="keyword" @keyup.enter="searchMusic"
                    placeholder="搜索歌名或歌手"
                    class="w-full pl-14 pr-6 py-5 bg-white border border-gray-200 rounded-3xl focus:border-purple-400 outline-none">
            </div>
            <button @click="searchMusic" :disabled="loading"
                class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white py-4 rounded-3xl font-semibold flex items-center justify-center gap-3 text-base shadow-md">
                <span v-if="loading" class="loader"></span>
                <span>{{ loading ? '搜索中...' : '🎵 搜索音乐' }}</span>
            </button>
        </div>

        <!-- 正在播放 -->
        <div v-if="currentSong" class="glass-card rounded-3xl p-6 mb-8 playing">
            <div class="flex flex-col items-center">
                <div class="relative glow-pulse mb-6">
                    <img :src="currentSong.cover" class="album-cover rounded-3xl object-cover ring-4 ring-white"
                         @error="currentSong.cover = defaultCover">
                </div>

                <div class="text-center w-full">
                    <div class="flex justify-center items-center gap-3 mb-2">
                        <div class="px-4 py-1 bg-purple-100 text-purple-700 text-xs font-medium rounded-full">正在播放</div>
                        <div class="waveform" v-if="currentPlayUrl">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl font-semibold text-gray-800 mb-1">{{ currentSong.name }}</h2>
                    <p class="text-gray-600 mb-4">{{ currentSong.artist }}</p>

                    <div v-if="currentLyric" class="lyric-box mb-5 border-t border-b border-gray-100 py-3">
                        {{ currentLyric }}
                    </div>

                    <audio :src="currentPlayUrl" controls autoplay class="w-full mb-4" @error="onPlayError" @ended="playNext"></audio>

                    <button @click="playNext"
                        class="bg-purple-500 hover:bg-purple-600 text-white px-8 py-3 rounded-2xl font-medium flex items-center gap-2 mx-auto">
                        下一首 ⏭
                    </button>
                </div>
            </div>
        </div>

        <!-- 播放列表 -->
        <div class="glass-modern rounded-3xl overflow-hidden mb-12">
            <div class="px-6 py-5 border-b border-gray-100 bg-white/70 flex items-center">
                <span class="text-2xl mr-3">📜</span>
                <span class="font-semibold text-xl text-gray-800">播放列表</span>
                <span class="ml-auto text-sm text-gray-500">{{ playlist.length }} 首</span>
            </div>
            <div class="max-h-[380px] overflow-y-auto divide-y divide-gray-100">
                <div v-for="(song, i) in playlist" :key="i"
                     @click="playSong(song)"
                     class="playlist-item flex items-center gap-4 p-4 cursor-pointer active:bg-purple-50"
                     :class="{ active: currentSong && currentSong.name === song.name }">
                    <div class="w-8 text-gray-400 font-mono text-sm">{{ (i+1).toString().padStart(2, '0') }}</div>
                    <img :src="song.cover" class="w-12 h-12 rounded-xl object-cover flex-shrink-0" @error="song.cover = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="font-medium text-gray-800 truncate">{{ song.name }}</div>
                        <div class="text-gray-500 text-sm truncate">{{ song.artist }}</div>
                    </div>
                    <div class="text-gray-400 text-xs">{{ song.duration }}</div>
                </div>
            </div>
        </div>

        <!-- GIF 放在最底部，居中显示 -->
        <div class="bottom-gif-container">
            <img src="https://qu.ax/PVqCB.gif" 
                 class="bottom-gif" 
                 alt="Eternity 音乐装饰">
        </div>

        <div class="text-center text-gray-500 text-sm mt-4">♡ Eternity. 音乐</div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const playlist = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const playError = ref('');
                const currentQuality = ref('128k');
                const currentLyric = ref('');

                const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';

                const qualities = [
                    { value: '128k', label: '标准' },
                    { value: '320k', label: '高品质' },
                    { value: 'flac', label: '无损' }
                ];

                const defaultPlaylist = [
                    { name: "嘎嘎", artist: "未知歌手", url: "https://files.catbox.moe/yjarpu.flac", cover: defaultCover, duration: "04:12" },
                    { name: "爱如星火", artist: "未知歌手", url: "https://files.catbox.moe/d5bklp.flac", cover: defaultCover, duration: "03:58" },
                    { name: "那一年那一天", artist: "未知歌手", url: "https://files.catbox.moe/fawyem.flac", cover: defaultCover, duration: "04:35" },
                    { name: "平凡之路", artist: "未知歌手", url: "https://files.catbox.moe/89l1hc.flac", cover: defaultCover, duration: "05:02" },
                    { name: "相濡以沫", artist: "未知歌手", url: "https://files.catbox.moe/0oluxu.flac", cover: defaultCover, duration: "04:20" },
                    { name: "不会改变", artist: "未知歌手", url: "https://files.catbox.moe/zsgxyr.flac", cover: defaultCover, duration: "03:45" },
                    { name: "朋克万岁", artist: "未知歌手", url: "https://files.catbox.moe/k2vbz2.flac", cover: defaultCover, duration: "04:10" },
                    { name: "500公里", artist: "未知歌手", url: "https://files.catbox.moe/gjyhqw.flac", cover: defaultCover, duration: "03:55" },
                    { name: "罪人", artist: "未知歌手", url: "https://files.catbox.moe/9p209l.flac", cover: defaultCover, duration: "04:28" },
                    { name: "曾经的你", artist: "未知歌手", url: "https://files.catbox.moe/6nm44r.flac", cover: defaultCover, duration: "05:15" },
                    { name: "空位", artist: "未知歌手", url: "https://streamshare.wireway.ch/download/yt5oyld9", cover: defaultCover, duration: "04:40" }
                ];

                playlist.value = [...defaultPlaylist];

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return alert('请输入歌名或歌手');
                    loading.value = true;
                    songs.value = [];
                    loading.value = false;
                };

                const playSong = (song) => {
                    currentSong.value = song;
                    playError.value = '';
                    currentPlayUrl.value = song.url;
                    currentLyric.value = '暂无歌词';
                };

                const playNext = () => {
                    if (!playlist.value.length || !currentSong.value) return;
                    const idx = playlist.value.findIndex(s => s.name === currentSong.value.name);
                    const nextIdx = (idx + 1) % playlist.value.length;
                    playSong(playlist.value[nextIdx]);
                };

                const refreshPlay = () => currentSong.value && playSong(currentSong.value);
                const onPlayError = () => playError.value = '播放失败，请尝试下一首';

                // 默认播放第一首
                setTimeout(() => {
                    if (playlist.value.length > 0) playSong(playlist.value[0]);
                }, 600);

                return {
                    keyword, songs, loading, currentSong, currentPlayUrl, playError, currentQuality, currentLyric,
                    playlist, qualities,
                    searchMusic, playSong, playNext, refreshPlay, onPlayError
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
