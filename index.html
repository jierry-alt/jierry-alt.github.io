<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>♡ Eternity. 音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #c026d3 0%, #7e22ce 50%, #3b82f6 100%);
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px;
        }
        .glass {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .album-cover {
            width: 260px;
            height: 260px;
            border-radius: 9999px;
            object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: spin 25s linear infinite paused;
        }
        .playing .album-cover { animation-play-state: running; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress { accent-color: #db2777; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto px-4 pt-8">
        <!-- 标题 -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-white tracking-tighter">♡ Eternity.</h1>
            <p class="text-white/80 mt-1 text-sm">沉浸式音乐体验</p>
        </div>

        <!-- 当前播放 -->
        <div v-if="currentSong" class="glass rounded-3xl p-8 text-center playing mb-10">
            <img :src="currentSong.cover" class="album-cover mx-auto mb-8" 
                 @error="currentSong.cover = defaultCover">

            <h2 class="text-2xl font-semibold text-gray-800 mb-2">{{ currentSong.name }}</h2>
            <p class="text-gray-600 mb-8">{{ currentSong.artist }}</p>

            <!-- 进度条 -->
            <div class="mb-8">
                <input type="range" v-model="progress" class="progress w-full" @input="seek">
                <div class="flex justify-between text-xs text-gray-500 mt-1">
                    <span>{{ formatTime(currentTime) }}</span>
                    <span>{{ formatTime(duration) }}</span>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="flex items-center justify-center gap-12 text-4xl">
                <button @click="playPrev" class="text-gray-600 hover:text-pink-600">⏮</button>
                <button @click="togglePlay"
                        class="w-20 h-20 bg-gradient-to-br from-pink-500 to-purple-600 text-white rounded-full flex items-center justify-center shadow-xl active:scale-95 transition-transform">
                    {{ isPlaying ? '❚❚' : '▶' }}
                </button>
                <button @click="playNext" class="text-gray-600 hover:text-pink-600">⏭</button>
            </div>
        </div>

        <!-- 音质选择按钮 -->
        <div class="glass rounded-3xl p-5 mb-8">
            <div class="text-sm text-gray-600 mb-3 text-center">音质选择</div>
            <div class="flex gap-3">
                <button 
                    @click="currentQuality = 'standard'"
                    :class="currentQuality === 'standard' ? 'bg-gradient-to-r from-pink-500 to-purple-500 text-white shadow' : 'bg-white border border-gray-200'"
                    class="flex-1 py-4 rounded-2xl font-semibold text-lg transition-all">
                    标准
                </button>
                <button 
                    @click="currentQuality = 'lossless'"
                    :class="currentQuality === 'lossless' ? 'bg-gradient-to-r from-pink-500 to-purple-500 text-white shadow' : 'bg-white border border-gray-200'"
                    class="flex-1 py-4 rounded-2xl font-semibold text-lg transition-all">
                    无损
                </button>
            </div>
        </div>

        <!-- 搜索 -->
        <div class="glass rounded-3xl p-6 mb-8">
            <div class="relative">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-pink-500 text-2xl">🔍</div>
                <input v-model="keyword" @keyup.enter="filterSongs"
                       placeholder="搜索歌名或歌手..."
                       class="w-full pl-14 py-5 bg-white border border-gray-200 rounded-3xl focus:outline-none focus:border-pink-400 text-lg">
            </div>
        </div>

        <!-- 你的11首歌曲列表 -->
        <div class="glass rounded-3xl overflow-hidden">
            <div class="px-6 py-4 border-b bg-white/70">
                <span class="font-semibold text-lg">你的推荐歌曲</span>
            </div>
            <div class="max-h-[420px] overflow-y-auto divide-y">
                <div v-for="(song, i) in filteredSongs" :key="i"
                     @click="playSong(song)"
                     :class="{ 'bg-pink-50': currentSong && currentSong.name === song.name }"
                     class="flex items-center gap-4 px-6 py-5 cursor-pointer hover:bg-pink-50">
                    <div class="w-6 text-gray-400 font-medium">{{ i + 1 }}</div>
                    <img :src="song.cover" class="w-14 h-14 rounded-2xl object-cover shadow" 
                         @error="song.cover = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="font-medium truncate">{{ song.name }}</div>
                        <div class="text-sm text-gray-500 truncate">{{ song.artist }}</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-white/60 text-xs mt-10">♡ Eternity. 音乐</div>
    </div>

    <!-- 底部迷你播放条 -->
    <div v-if="currentSong" class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t max-w-md mx-auto">
        <div class="flex items-center gap-4 px-5 py-4">
            <img :src="currentSong.cover" class="w-12 h-12 rounded-xl object-cover">
            <div class="flex-1 min-w-0">
                <div class="font-medium text-sm truncate">{{ currentSong.name }}</div>
                <div class="text-xs text-gray-500 truncate">{{ currentSong.artist }}</div>
            </div>
            <button @click="togglePlay" class="text-3xl text-pink-600">
                {{ isPlaying ? '❚❚' : '▶' }}
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;

        createApp({
            setup() {
                const keyword = ref('');
                const currentSong = ref(null);
                const isPlaying = ref(false);
                const progress = ref(0);
                const currentTime = ref(0);
                const duration = ref(0);
                const currentQuality = ref('standard');   // 默认标准

                const defaultCover = 'https://picsum.photos/id/1015/600/600';

                // 你原来的11首歌曲
                const recommendedSongs = ref([
                    { name: "嘎嘎", artist: "未知歌手", url: "https://files.catbox.moe/yjarpu.flac", cover: defaultCover },
                    { name: "爱如星火", artist: "未知歌手", url: "https://files.catbox.moe/d5bklp.flac", cover: defaultCover },
                    { name: "那一年那一天", artist: "未知歌手", url: "https://files.catbox.moe/fawyem.flac", cover: defaultCover },
                    { name: "平凡之路", artist: "未知歌手", url: "https://files.catbox.moe/89l1hc.flac", cover: defaultCover },
                    { name: "相濡以沫", artist: "未知歌手", url: "https://files.catbox.moe/0oluxu.flac", cover: defaultCover },
                    { name: "不会改变", artist: "未知歌手", url: "https://files.catbox.moe/zsgxyr.flac", cover: defaultCover },
                    { name: "朋克万岁", artist: "未知歌手", url: "https://files.catbox.moe/k2vbz2.flac", cover: defaultCover },
                    { name: "500公里", artist: "未知歌手", url: "https://files.catbox.moe/gjyhqw.flac", cover: defaultCover },
                    { name: "罪人", artist: "未知歌手", url: "https://files.catbox.moe/9p209l.flac", cover: defaultCover },
                    { name: "曾经的你", artist: "未知歌手", url: "https://files.catbox.moe/6nm44r.flac", cover: defaultCover },
                    { name: "空位", artist: "未知歌手", url: "https://streamshare.wireway.ch/download/yt5oyld9", cover: defaultCover }
                ]);

                let audio = null;

                const initAudio = () => {
                    if (audio) audio.pause();
                    audio = new Audio();
                    audio.onloadedmetadata = () => duration.value = audio.duration || 0;
                    audio.ontimeupdate = () => {
                        currentTime.value = audio.currentTime;
                        if (duration.value) progress.value = (audio.currentTime / duration.value) * 100;
                    };
                    audio.onended = playNext;
                };

                const playSong = (song) => {
                    currentSong.value = song;
                    initAudio();
                    audio.src = song.url;
                    audio.play().then(() => isPlaying.value = true).catch(() => {});
                };

                const togglePlay = () => {
                    if (!audio) return;
                    if (isPlaying.value) {
                        audio.pause();
                        isPlaying.value = false;
                    } else {
                        audio.play();
                        isPlaying.value = true;
                    }
                };

                const playNext = () => {
                    if (!currentSong.value) return;
                    const idx = recommendedSongs.value.findIndex(s => s.name === currentSong.value.name);
                    const nextIdx = (idx + 1) % recommendedSongs.value.length;
                    playSong(recommendedSongs.value[nextIdx]);
                };

                const playPrev = () => {
                    if (!currentSong.value) return;
                    const idx = recommendedSongs.value.findIndex(s => s.name === currentSong.value.name);
                    const prevIdx = (idx - 1 + recommendedSongs.value.length) % recommendedSongs.value.length;
                    playSong(recommendedSongs.value[prevIdx]);
                };

                const seek = () => {
                    if (audio && duration.value) {
                        audio.currentTime = (progress.value / 100) * duration.value;
                    }
                };

                const formatTime = (sec) => {
                    if (!sec) return "0:00";
                    const m = Math.floor(sec / 60);
                    const s = Math.floor(sec % 60);
                    return `${m}:${s < 10 ? '0' : ''}${s}`;
                };

                const filteredSongs = computed(() => {
                    if (!keyword.value.trim()) return recommendedSongs.value;
                    const k = keyword.value.toLowerCase();
                    return recommendedSongs.value.filter(song =>
                        song.name.toLowerCase().includes(k) ||
                        (song.artist && song.artist.toLowerCase().includes(k))
                    );
                });

                // 默认播放第一首
                onMounted(() => {
                    setTimeout(() => {
                        if (recommendedSongs.value.length) playSong(recommendedSongs.value[0]);
                    }, 400);
                });

                return {
                    keyword, currentSong, isPlaying, progress, currentTime, duration,
                    currentQuality, recommendedSongs, filteredSongs,
                    playSong, togglePlay, playNext, playPrev, seek, formatTime
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
