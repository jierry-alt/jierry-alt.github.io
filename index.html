<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>♡｡Eternity.✨音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #2a1b5e 0%, #1a0b3d 50%, #0a0f2e 100%);
            min-height: 100vh;
            position: relative;
            color: white;
            overflow: hidden;
        }

        /* 雪花效果 */
        .snowflake {
            position: fixed;
            top: -15px;
            color: #fff;
            font-size: 1.3em;
            pointer-events: none;
            z-index: 5;
            opacity: 0.85;
            animation: fall linear infinite, sway 4s ease-in-out infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }
        @keyframes sway { 0%,100% { transform: translateX(0); } 50% { transform: translateX(30px); } }

        .marquee-container {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 12px 0;
            z-index: 100;
            overflow: hidden;
            border-bottom: 1px solid rgba(167, 139, 250, 0.4);
        }
        .marquee {
            white-space: nowrap; display: inline-block;
            animation: marquee 25s linear infinite;
            padding-left: 100%;
            font-weight: bold; color: #e0d4ff; font-size: 1.1rem;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .glass-modern { background: rgba(15, 12, 41, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(167, 139, 250, 0.25); }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); border: 1px solid rgba(167, 139, 250, 0.2); }

        .song-item:hover { background: linear-gradient(90deg, rgba(129, 140, 248, 0.3), rgba(167, 139, 250, 0.2)); transform: translateX(6px); }

        .main-title {
            font-size: 2.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #c4b5fd, #e0d4ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        @media (max-width: 640px) { .main-title { font-size: 1.85rem; } }

        .quality-btn {
            font-size: 0.93rem;
            padding: 10px 18px;
            min-width: 85px;
        }
        .quality-btn-active {
            background: linear-gradient(135deg, #c4b5fd, #a5b4fc);
            color: #1e1b4b;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(165, 180, 252, 0.5);
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snow-container" class="fixed inset-0 pointer-events-none z-5"></div>

    <!-- 跑马灯 -->
    <div class="marquee-container">
        <div class="marquee">
            🔥 犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            🔥 犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        </div>
    </div>

    <div id="app" class="relative z-10 max-w-5xl mx-auto px-4 pt-16 pb-8">

        <!-- 标题 + 音质按钮 -->
        <div class="text-center mb-8">
            <h1 class="main-title">♡｡Eternity.✨音乐</h1>
            <div class="flex justify-center gap-2.5 mt-6 flex-wrap">
                <button v-for="q in qualities" :key="q.value"
                    @click="currentQuality = q.value"
                    class="quality-btn rounded-3xl text-sm font-medium border border-white/30 hover:border-violet-400"
                    :class="{ 'quality-btn-active': currentQuality === q.value }">
                    {{ q.label }}
                </button>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="glass-modern rounded-3xl p-6 md:p-8 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-400 text-2xl">🔍</div>
                    <input v-model="keyword" @keyup.enter="searchMusic" 
                        placeholder="搜索歌名、歌手... 如：晴天、周杰伦" 
                        class="w-full pl-14 pr-6 py-4 bg-white/10 border border-white/30 rounded-2xl text-white placeholder-white/60 focus:border-violet-400 outline-none text-base">
                </div>
                <button @click="searchMusic" :disabled="loading"
                    class="bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 px-10 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 shadow-lg min-w-[130px]">
                    <span v-if="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    <span v-else>🎵 搜索</span>
                </button>
            </div>
        </div>

        <!-- 当前播放器 -->
        <div v-if="currentSong" class="glass-card rounded-3xl p-6 mb-8">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div class="relative flex-shrink-0">
                    <img :src="currentSong.cover" class="w-36 h-36 md:w-44 md:h-44 rounded-2xl shadow-2xl object-cover" @error="currentSong.cover = defaultCover">
                </div>
                <div class="flex-1 w-full">
                    <div class="text-center md:text-left">
                        <h2 class="text-2xl font-bold mb-1">{{ currentSong.name }}</h2>
                        <p class="text-white/75">{{ currentSong.artist }}</p>
                    </div>
                    <div class="flex items-center justify-center md:justify-start gap-8 mt-8">
                        <button @click="prevSong" class="text-4xl hover:scale-110 transition">⏮</button>
                        <button @click="togglePlay" class="w-16 h-16 flex items-center justify-center bg-gradient-to-br from-violet-500 to-indigo-500 rounded-full text-4xl shadow-xl hover:scale-105 transition">
                            {{ isPlaying ? '❚❚' : '▶' }}
                        </button>
                        <button @click="nextSong" class="text-4xl hover:scale-110 transition">⏭</button>
                    </div>
                </div>
            </div>
            <audio ref="audioPlayer" :src="currentPlayUrl" @ended="nextSong" @error="onPlayError" class="hidden"></audio>
        </div>

        <!-- 播放列表（你的11首歌曲在这里） -->
        <div class="glass-card rounded-3xl overflow-hidden mb-8">
            <div class="px-6 py-5 border-b border-white/10 flex items-center justify-between bg-black/30">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📜</span>
                    <span class="font-semibold text-lg">播放列表 ({{ playlist.length }})</span>
                </div>
                <button @click="clearPlaylist" class="text-white/60 hover:text-red-400 text-sm">清空</button>
            </div>
            <div class="max-h-[420px] overflow-y-auto divide-y divide-white/10">
                <div v-for="(song, idx) in playlist" :key="song.id + idx"
                     @click="playFromPlaylist(idx)"
                     class="song-item p-4 flex items-center gap-4 cursor-pointer">
                    <div class="w-8 text-center text-white/50 font-mono">{{ String(idx+1).padStart(2, '0') }}</div>
                    <img :src="song.cover" class="w-12 h-12 rounded-xl object-cover" @error="song.cover = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold truncate">{{ song.name }}</div>
                        <div class="text-white/60 text-sm truncate">{{ song.artist }}</div>
                    </div>
                    <button @click.stop="removeFromPlaylist(idx)" class="text-white/40 hover:text-red-400">✕</button>
                </div>
            </div>
        </div>

        <!-- 搜索结果 -->
        <div class="glass-card rounded-3xl overflow-hidden">
            <div class="px-6 py-5 border-b border-white/10 flex justify-between items-center">
                <span class="font-semibold text-lg flex items-center gap-2">
                    <span>🔍</span> 搜索结果
                    <span v-if="songs.length" class="text-sm bg-white/10 px-3 py-1 rounded-full">{{ songs.length }} 首</span>
                </span>
            </div>

            <div v-if="loading && !songs.length" class="p-20 text-center">
                <div class="w-10 h-10 border-4 border-violet-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p>正在搜索音乐...</p>
            </div>

            <div v-else-if="!songs.length && !loading" class="p-20 text-center text-white/50">
                输入关键词开始搜索
            </div>

            <div v-else class="divide-y divide-white/10 max-h-[480px] overflow-y-auto">
                <div v-for="song in songs" :key="song.id" @click="addToPlaylistAndPlay(song)"
                    class="song-item p-5 flex items-center gap-5 cursor-pointer">
                    <img :src="song.cover" class="w-14 h-14 rounded-2xl object-cover shadow">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-base truncate">{{ song.name }}</div>
                        <div class="text-white/60 text-sm truncate">{{ song.artist }}</div>
                    </div>
                    <button class="text-2xl text-violet-400 hover:scale-110 transition">＋</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';

        // 雪花效果
        function createSnowflakes() {
            const container = document.getElementById('snow-container');
            const chars = ['❄︎', '❅', '❆', '✽', '❉'];
            for (let i = 0; i < 65; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.textContent = chars[Math.floor(Math.random() * chars.length)];
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = (Math.random() * 12 + 9) + 's';
                flake.style.animationDelay = '-' + Math.random() * 15 + 's';
                flake.style.fontSize = (Math.random() * 1.4 + 0.9) + 'em';
                container.appendChild(flake);
            }
        }

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const playlist = ref([]);
                const currentIndex = ref(-1);
                const isPlaying = ref(false);
                const currentQuality = ref('flac');

                const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';

                const qualities = [
                    { value: '128k', label: '标准' },
                    { value: '320k', label: '高品质' },
                    { value: 'flac', label: '无损' }
                ];

                // 你的11首歌曲（完整版）
                const specialPlaylist = [
                    { id: 1001, name: "嘎嘎", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/yjarpu.flac" },
                    { id: 1002, name: "爱如星火", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/d5bklp.flac" },
                    { id: 1003, name: "那一年那一天", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/fawyem.flac" },
                    { id: 1004, name: "平凡之路", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/89l1hc.flac" },
                    { id: 1005, name: "相濡以沫", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/0oluxu.flac" },
                    { id: 1006, name: "不会改变", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/zsgxyr.flac" },
                    { id: 1007, name: "朋克万岁", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/k2vbz2.flac" },
                    { id: 1008, name: "500公里", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/gjyhqw.flac" },
                    { id: 1009, name: "罪人", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/9p209l.flac" },
                    { id: 1010, name: "曾经的你", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/6nm44r.flac" },
                    { id: 1011, name: "空位", artist: "Eternity", cover: defaultCover, url: "https://streamshare.wireway.ch/download/yt5oyld9" }
                ];

                // 重要：直接赋值播放列表
                playlist.value = JSON.parse(JSON.stringify(specialPlaylist));

                // 加载第一首
                setTimeout(() => {
                    if (playlist.value.length > 0) playSong(0);
                }, 500);

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return alert('请输入歌名或歌手');
                    loading.value = true;
                    songs.value = [];

                    try {
                        const postData = {
                            req_1: {
                                method: "DoSearchForQQMusicDesktop",
                                module: "music.search.SearchCgiService",
                                param: { query: keyword.value, num_per_page: 20, page_num: 1, search_type: 0 }
                            }
                        };

                        const res = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', postData, {
                            headers: { 'Referer': 'https://y.qq.com' }
                        });

                        const songList = res.data?.req_1?.data?.body?.song?.list || [];
                        songs.value = songList.map(item => ({
                            id: item.id,
                            mid: item.mid,
                            name: item.name,
                            artist: item.singer?.map(s => s.name).join(', ') || '未知歌手',
                            cover: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R300x300M000${item.album.mid}.jpg` : defaultCover
                        }));
                    } catch (e) {
                        alert('搜索失败，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                const getPlayUrl = (song) => song.url || null;

                const playSong = (index) => {
                    if (index < 0 || index >= playlist.value.length) return;
                    currentIndex.value = index;
                    currentSong.value = playlist.value[index];
                    currentPlayUrl.value = getPlayUrl(currentSong.value);

                    const audio = document.querySelector('audio');
                    if (audio) {
                        audio.src = currentPlayUrl.value;
                        audio.play().then(() => isPlaying.value = true).catch(() => {});
                    }
                };

                const togglePlay = () => {
                    const audio = document.querySelector('audio');
                    if (!audio) return;
                    isPlaying.value ? audio.pause() : audio.play();
                    isPlaying.value = !isPlaying.value;
                };

                const nextSong = () => {
                    let next = currentIndex.value + 1;
                    if (next >= playlist.value.length) next = 0;
                    playSong(next);
                };

                const prevSong = () => {
                    let prev = currentIndex.value - 1;
                    if (prev < 0) prev = playlist.value.length - 1;
                    playSong(prev);
                };

                const addToPlaylistAndPlay = (song) => {
                    playlist.value.push(song);
                    playSong(playlist.value.length - 1);
                };

                const playFromPlaylist = (index) => playSong(index);
                const removeFromPlaylist = (index) => {
                    if (index === currentIndex.value) nextSong();
                    playlist.value.splice(index, 1);
                };
                const clearPlaylist = () => {
                    if (confirm('确定清空播放列表吗？')) {
                        playlist.value = [];
                        currentSong.value = null;
                        isPlaying.value = false;
                    }
                };
                const onPlayError = () => {
                    alert('播放失败，已跳到下一首');
                    nextSong();
                };

                return {
                    keyword, songs, loading, currentSong, currentPlayUrl, playlist, isPlaying,
                    currentQuality, qualities,
                    searchMusic, togglePlay, nextSong, prevSong,
                    addToPlaylistAndPlay, playFromPlaylist, removeFromPlaylist, clearPlaylist, onPlayError
                };
            },
            mounted() {
                createSnowflakes();
            }
        }).mount('#app');
    </script>
</body>
</html>
