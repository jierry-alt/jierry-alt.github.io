<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>二宝子音乐网 | 二宝子专属</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #3b0764 0%, #6b21a8 45%, #9f1239 80%, #be185d 100%);
            min-height: 100vh;
            margin: 0;
            padding-top: 55px;
            overflow-x: hidden;
        }

        .snowflake {
            position: absolute;
            top: -25px;
            color: #f3e8ff;
            font-size: 15px;
            pointer-events: none;
            z-index: 5;
            animation: snowfall linear infinite;
            opacity: 0.85;
        }
        @keyframes snowfall { to { transform: translateY(115vh); } }

        .marquee-container {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(14px);
            z-index: 100;
            padding: 10px 0;
            overflow: hidden;
        }
        .marquee {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 21s linear infinite;
            font-size: 15px;
            font-weight: 700;
            color: white;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .glass {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.22);
        }

        .scroll-area {
            max-height: 390px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .title {
            font-size: 2.05rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #f472b6, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="snow-container" class="fixed inset-0 pointer-events-none z-10"></div>

    <!-- 跑马灯 -->
    <div class="marquee-container">
        <div class="marquee">
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>
    </div>

    <div id="app" class="relative z-20 max-w-md mx-auto px-4 pb-8">

        <!-- 标题 -->
        <div class="text-center mb-6">
            <h1 class="title">二宝子音乐网</h1>
            <p class="text-pink-200 text-sm mt-1">二宝子专属 · 无损音源</p>
        </div>

        <!-- SVIP音源按钮 -->
        <div class="glass rounded-3xl p-5 mb-5">
            <button class="w-full py-4 rounded-2xl font-bold text-lg bg-gradient-to-r from-pink-500 to-purple-600 text-white flex items-center justify-center gap-2">
                👑 二宝子SVIP音源
            </button>
        </div>

        <!-- 搜索栏（搜索按钮移到下方） -->
        <div class="glass rounded-3xl p-5 mb-6">
            <input v-model="keyword" @keyup.enter="searchMusic"
                   type="text" placeholder="输入歌名或歌手"
                   class="w-full bg-white/10 border border-white/30 rounded-2xl px-5 py-3.5 text-white placeholder-pink-200 outline-none text-base mb-3">

            <button @click="searchMusic" :disabled="loading"
                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-3.5 rounded-2xl text-white font-medium">
                <span v-if="loading">搜索中...</span>
                <span v-else>搜索</span>
            </button>
        </div>

        <!-- 当前播放 -->
        <div v-if="currentSong" class="glass rounded-3xl p-5 mb-6">
            <div class="flex gap-4">
                <img :src="currentSong.artwork" class="w-20 h-20 rounded-2xl object-cover" @error="currentSong.artwork = defaultCover">
                <div class="flex-1 min-w-0">
                    <div class="font-semibold text-base leading-tight truncate">{{ currentSong.title }}</div>
                    <div class="text-pink-200 text-sm mt-1 truncate">{{ currentSong.artist }}</div>
                    <audio :src="currentPlayUrl" controls class="w-full mt-4 rounded-xl"></audio>
                </div>
            </div>
        </div>

        <!-- 标签切换 -->
        <div class="flex bg-white/10 rounded-3xl p-1 mb-5">
            <button @click="activeTab = 'search'" 
                    :class="activeTab === 'search' ? 'bg-white text-purple-900 font-semibold' : 'text-white'"
                    class="flex-1 py-3 rounded-3xl text-base">搜索结果</button>
            <button @click="activeTab = 'playlist'" 
                    :class="activeTab === 'playlist' ? 'bg-white text-purple-900 font-semibold' : 'text-white'"
                    class="flex-1 py-3 rounded-3xl text-base">二宝子歌单</button>
        </div>

        <!-- 可滑动内容 -->
        <div class="glass rounded-3xl overflow-hidden">
            <div v-if="activeTab === 'search'" class="scroll-area">
                <div class="px-5 py-3 border-b border-white/10 text-xs text-purple-200">搜索结果</div>
                <div v-if="loading" class="py-12 text-center text-purple-300">搜索中...</div>
                <div v-else-if="songs.length === 0" class="py-12 text-center text-purple-300 text-sm">
                    输入关键词后点击搜索
                </div>
                <div v-else class="divide-y divide-white/10">
                    <div v-for="(song, i) in songs" :key="i" @click="playSong(song)"
                         class="px-5 py-4 flex items-center gap-4 cursor-pointer hover:bg-white/10">
                        <span class="text-purple-400 w-5 text-right">{{ i+1 }}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-white text-base truncate">{{ song.title }}</div>
                            <div class="text-purple-200 text-sm truncate">{{ song.artist }}</div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="activeTab === 'playlist'" class="scroll-area">
                <div class="px-5 py-3 border-b border-white/10 text-xs text-purple-200">二宝子歌单</div>
                <div class="divide-y divide-white/10">
                    <div v-for="(song, i) in playlist" :key="i" @click="playLocalSong(song)"
                         class="px-5 py-4 flex items-center gap-4 cursor-pointer hover:bg-white/10">
                        <span class="text-purple-400 w-5 text-right">{{ i+1 }}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-white text-base truncate">{{ song.title }}</div>
                            <div class="text-purple-200 text-sm">二宝子</div>
                        </div>
                        <button @click.stop="downloadLocalSong(song)" 
                                class="text-xs px-5 py-1.5 bg-white/10 hover:bg-white/20 rounded-xl">下载</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-purple-300/50 text-xs mt-8">二宝子音乐网</div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const PROXY = 'https://proxy.api.030101.xyz/';
        const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
        const urlCache = new Map();

        const localPlaylist = [
            { title: "嘎嘎", url: "https://files.catbox.moe/yjarpu.flac" },
            { title: "爱如星火", url: "https://files.catbox.moe/d5bklp.flac" },
            { title: "那一年那一天", url: "https://files.catbox.moe/fawyem.flac" },
            { title: "平凡之路", url: "https://files.catbox.moe/89l1hc.flac" },
            { title: "相濡以沫", url: "https://files.catbox.moe/0oluxu.flac" },
            { title: "不会改变", url: "https://files.catbox.moe/zsgxyr.flac" },
            { title: "朋克万岁", url: "https://files.catbox.moe/k2vbz2.flac" },
            { title: "500公里", url: "https://files.catbox.moe/gjyhqw.flac" },
            { title: "罪人", url: "https://files.catbox.moe/9p209l.flac" },
            { title: "曾经的你", url: "https://files.catbox.moe/6nm44r.flac" },
            { title: "空位", url: "https://streamshare.wireway.ch/download/yt5oyld9" }
        ];

        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const activeTab = ref('search');
                const playlist = ref(localPlaylist);

                const createSnowflakes = () => {
                    const container = document.getElementById('snow-container');
                    for (let i = 0; i < 50; i++) {
                        const flake = document.createElement('div');
                        flake.className = 'snowflake';
                        flake.textContent = '❄︎';
                        flake.style.left = Math.random() * 100 + 'vw';
                        flake.style.animationDuration = (8 + Math.random() * 9) + 's';
                        flake.style.animationDelay = '-' + Math.random() * 12 + 's';
                        container.appendChild(flake);
                        setTimeout(() => flake.remove(), 25000);
                    }
                };

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return;
                    loading.value = true;
                    songs.value = [];
                    try {
                        const postData = { req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 20, page_num: 1, query: keyword.value, search_type: 0 } }};
                        const res = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', postData);
                        const list = res.data?.req_1?.data?.body?.song?.list || [];
                        songs.value = list.map(item => ({
                            title: item.title || item.songname,
                            artist: item.singer?.map(s => s.name).join("、") || "未知歌手",
                            songmid: item.mid || item.songmid,
                            artwork: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R800x800M000${item.album.mid}.jpg` : defaultCover
                        }));
                    } catch (e) {}
                    loading.value = false;
                };

                async function getPlayUrl(songmid) {
                    if (urlCache.has(songmid)) return urlCache.get(songmid);
                    try {
                        const res = await axios.get(PROXY + `https://api.xunhuisi.store/API/QQMusic/Song.php?mid=${songmid}`);
                        if (res.data?.code === 200 && res.data.music_url) {
                            urlCache.set(songmid, res.data.music_url);
                            return res.data.music_url;
                        }
                    } catch (e) {}
                    return null;
                }

                const playSong = async (song) => {
                    currentSong.value = song;
                    const url = await getPlayUrl(song.songmid);
                    if (url) currentPlayUrl.value = url;
                };

                const playLocalSong = (song) => {
                    currentSong.value = { title: song.title, artist: "二宝子", artwork: defaultCover };
                    currentPlayUrl.value = song.url;
                };

                const downloadLocalSong = (song) => {
                    const a = document.createElement('a');
                    a.href = song.url;
                    a.download = song.title + ".flac";
                    a.click();
                };

                setTimeout(() => {
                    createSnowflakes();
                    setInterval(createSnowflakes, 9000);
                }, 400);

                return {
                    keyword, songs, loading, currentSong, currentPlayUrl, activeTab, playlist,
                    searchMusic, playSong, playLocalSong, downloadLocalSong
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
