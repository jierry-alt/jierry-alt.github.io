<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
    <title>♡ Eternity. 音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #ff9ef5 0%, #a78bff 40%, #7dd3fc 75%, #67e8f9 100%);
            min-height: 100vh; 
            position: relative; 
            color: #1f2937; 
            padding-bottom: 40px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.7) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.55) 0%, transparent 60%);
            z-index: 0;
        }

        .marquee-container { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); 
            padding: 10px 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.65); 
        }
        .marquee { white-space: nowrap; display: inline-block; animation: marquee 25s linear infinite; padding-left: 100%; }
        .marquee a { color: #6b21a8; font-weight: 700; padding: 6px 24px; background: rgba(236,72,153,0.3); border-radius: 9999px; margin: 0 8px; font-size: 14.5px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .glass-modern, .glass-card {
            background: rgba(255,255,255,0.92); backdrop-filter: blur(22px); 
            border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 10px 35px rgba(0,0,0,0.1);
        }

        .album-cover { 
            width: 160px; height: 160px; 
            animation: vinyl-spin 25s linear infinite paused; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.18); 
        }
        .playing .album-cover { animation-play-state: running; }
        @keyframes vinyl-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .main-title { font-size: 2.1rem; line-height: 1.1; }

        .song-item { 
            padding: 16px 18px; 
            transition: all 0.2s;
        }
        .song-item:hover { background: rgba(168,85,247,0.15); }

        .loader { width: 28px; height: 28px; border: 4px solid rgba(168,85,247,0.3); border-top-color: #c026d3; border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="#" target="_blank">🔥 专业白嫖</a>
            <a href="#" target="_blank">🔥 专业白嫖</a>
            <a href="#" target="_blank">🔥 专业白嫖</a>
        </div>
    </div>

    <div id="app" class="relative z-10 max-w-xl mx-auto px-4 pt-20 pb-8">
        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="main-title font-bold bg-gradient-to-r from-purple-600 via-pink-500 to-cyan-500 bg-clip-text text-transparent">
                ♡ Eternity. 音乐
            </h1>
            <p class="text-gray-600 mt-1 text-sm">沉浸式音乐体验</p>
        </div>

        <!-- 搜索区域 -->
        <div class="glass-modern rounded-3xl p-6 mb-8">
            <div class="flex gap-2 mb-6 flex-wrap">
                <button v-for="q in qualities" :key="q.value"
                    @click="currentQuality = q.value"
                    :class="currentQuality === q.value ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white' : 'bg-white border border-gray-200'"
                    class="flex-1 py-3 rounded-2xl text-sm font-semibold transition-all">
                    {{ q.label }}
                </button>
            </div>
            <div class="relative mb-6">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-pink-500 text-xl">🔍</div>
                <input v-model="keyword" @keyup.enter="searchMusic"
                    placeholder="搜索歌名、歌手..."
                    class="w-full pl-14 pr-6 py-5 bg-white border border-gray-200 rounded-3xl focus:border-purple-400 outline-none">
            </div>
            <button @click="searchMusic" :disabled="loading"
                class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white py-4 rounded-3xl font-semibold flex items-center justify-center gap-3">
                <span v-if="loading" class="loader"></span>
                <span>{{ loading ? '搜索中...' : '🎵 搜索音乐' }}</span>
            </button>
        </div>

        <!-- 简单播放器（已改回原版风格 + 下一曲按钮） -->
        <div v-if="currentSong" class="glass-card rounded-3xl p-6 mb-8 playing">
            <div class="flex flex-col items-center">
                <img :src="currentSong.cover" class="album-cover rounded-3xl object-cover ring-4 ring-white mb-6"
                     @error="currentSong.cover = defaultCover">

                <div class="text-center w-full">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-1">{{ currentSong.name }}</h2>
                    <p class="text-gray-600 mb-6">{{ currentSong.artist }}</p>

                    <audio :src="currentPlayUrl" controls class="w-full mb-4" @error="playError = '播放失败，尝试下一首'" @ended="playNext"></audio>

                    <div class="flex justify-center gap-8">
                        <button @click="playPrev" class="text-3xl text-gray-600 hover:text-purple-600">⏮</button>
                        <button @click="playNext" class="text-3xl text-purple-600 hover:scale-110 transition">下一曲 ⏭</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索结果 -->
        <div v-if="searchResults.length" class="glass-modern rounded-3xl overflow-hidden mb-8">
            <div class="px-6 py-4 border-b bg-white/70">
                <span class="font-semibold text-lg">搜索结果</span>
            </div>
            <div class="max-h-[280px] overflow-y-auto divide-y">
                <div v-for="(song, i) in searchResults" :key="i"
                     @click="playSong(song)"
                     class="song-item flex items-center gap-4 cursor-pointer hover:bg-purple-50">
                    <img :src="song.cover" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="font-medium truncate">{{ song.name }}</div>
                        <div class="text-sm text-gray-500 truncate">{{ song.artist }}</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 你的11首上传歌曲（保留且可播放） -->
        <div class="glass-modern rounded-3xl overflow-hidden">
            <div class="px-6 py-4 border-b bg-white/70">
                <span class="font-semibold text-lg">推荐歌曲（你的上传）</span>
            </div>
            <div class="max-h-[340px] overflow-y-auto divide-y">
                <div v-for="(song, i) in recommendedSongs" :key="i"
                     @click="playSong(song)"
                     class="song-item flex items-center gap-4 cursor-pointer hover:bg-purple-50">
                    <div class="w-6 text-gray-400">{{ (i+1) }}</div>
                    <img :src="song.cover" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="font-medium truncate">{{ song.name }}</div>
                        <div class="text-sm text-gray-500 truncate">{{ song.artist }}</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-gray-500 text-sm mt-10">♡ Eternity. 音乐</div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        const PROXY = 'https://corsproxy.io/?';   // 当前较稳定代理

        createApp({
            setup() {
                const keyword = ref('');
                const searchResults = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const currentQuality = ref('128k');
                const playError = ref('');

                const defaultCover = 'https://picsum.photos/id/1015/300/300';

                const qualities = [
                    { value: '128k', label: '标准' },
                    { value: '320k', label: '高品质' },
                    { value: 'flac', label: '无损' }
                ];

                // 你的11首上传歌曲（直链，可直接播放）
                const recommendedSongs = ref([
                    { name: "嘎嘎", artist: "未知歌手", url: "https://files.catbox.moe/yjarpu.flac", cover: defaultCover },
                    { name: "爱如星火", artist: "未知歌手", url: "https://files.catbox.moe/d5bklp.flac", cover: defaultCover },
                    { name: "那一年那一天", artist: "未知歌手", url: "https://files.catbox.moe/fawyem.flac", cover: defaultCover },
                    { name: "平凡之路", artist: "未知歌手", url: "https://files.catbox.moe/89l1hc.flac", cover: defaultCover },
                    { name: "相濡以沫", artist: "未知歌手", url: "https://files.catbox.moe/0oluxu.flac", cover: defaultCover },
                    { name: "不会改变", artist: "未知歌手", url: "https://files.catbox.moe/zsgxyr.flac", cover: defaultCover },
                    { name: "朋克万岁", artist: "未知歌手", url: "https://files.catbox.moe/k2vbz2.flac", cover: defaultCover },
                    { name: "500公里", artist: "未知歌手", url: "https://files.catbox.moe/gjyhqw.flac", cover: defaultCover },
                    { name: "罪人", artist: "未知歌手", url: "https://files.catbox.moe/9p209l.flac", cover: defaultCover },
                    { name: "曾经的你", artist: "未知歌手", url: "https://files.catbox.moe/6nm44r.flac", cover: defaultCover },
                    { name: "空位", artist: "未知歌手", url: "https://streamshare.wireway.ch/download/yt5oyld9", cover: defaultCover }
                ]);

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return alert('请输入歌名或歌手');
                    loading.value = true;
                    searchResults.value = [];

                    try {
                        const postData = { req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 20, page_num: 1, query: keyword.value } } };
                        const data = await axios.post(PROXY + encodeURIComponent('https://u.y.qq.com/cgi-bin/musicu.fcg'), postData);
                        const list = data.data?.req_1?.data?.body?.song?.list || [];
                        searchResults.value = list.map(item => ({
                            mid: item.mid,
                            name: item.name,
                            artist: item.singer?.map(s => s.name).join('、') || '未知',
                            cover: defaultCover
                        }));
                    } catch (e) {
                        alert('搜索失败，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                const getPlayUrl = (mid) => {
                    if (!mid) return null;
                    const q = currentQuality.value === 'flac' ? 'flac' : currentQuality.value === '320k' ? '320' : '128';
                    return `https://api.66mz8.com/api/qqmusic.php?id=${mid}&type=${q}`;
                };

                const playSong = (song) => {
                    currentSong.value = song;
                    // 优先使用你上传的直链，其次用QQ代理
                    currentPlayUrl.value = song.url || (song.mid ? getPlayUrl(song.mid) : null);
                };

                const playNext = () => {
                    if (!currentSong.value || !recommendedSongs.value.length) return;
                    const idx = recommendedSongs.value.findIndex(s => s.name === currentSong.value.name);
                    const nextIdx = idx === -1 ? 0 : (idx + 1) % recommendedSongs.value.length;
                    playSong(recommendedSongs.value[nextIdx]);
                };

                const playPrev = () => {
                    if (!currentSong.value || !recommendedSongs.value.length) return;
                    const idx = recommendedSongs.value.findIndex(s => s.name === currentSong.value.name);
                    const prevIdx = idx === -1 ? 0 : (idx - 1 + recommendedSongs.value.length) % recommendedSongs.value.length;
                    playSong(recommendedSongs.value[prevIdx]);
                };

                // 默认播放第一首你的歌曲
                setTimeout(() => {
                    if (recommendedSongs.value.length) playSong(recommendedSongs.value[0]);
                }, 300);

                return {
                    keyword, loading, currentSong, currentPlayUrl, currentQuality,
                    recommendedSongs, qualities, searchResults,
                    searchMusic, playSong, playNext, playPrev
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
