<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>二宝子音乐 | 二宝子专属</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #2a0a3a 0%, #4c1d95 40%, #9f1239 80%, #be185d 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        /* 雪花效果 */
        .snowflake {
            position: absolute;
            top: -15px;
            color: #f8fafc;
            font-size: 16px;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255,255,255,0.7);
            animation: snowfall linear infinite;
            opacity: 0.75;
        }
        
        @keyframes snowfall {
            to { transform: translateY(110vh); }
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 40% 30%, rgba(236, 72, 153, 0.18) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }
        
        .marquee-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 10px 0;
            z-index: 100;
            border-bottom: 1px solid rgba(236, 72, 153, 0.3);
        }
        
        .marquee {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 16s linear infinite;
            padding-left: 100%;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 12px rgba(236, 72, 153, 0.9);
        }
        
        .marquee span {
            padding: 0 35px;
            font-size: 15.5px;
            letter-spacing: 1.5px;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        
        .glass-modern {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(236, 72, 153, 0.25);
        }
        
        .main-title {
            font-size: 2.75rem;
            letter-spacing: -0.04em;
            font-weight: 800;
            background: linear-gradient(90deg, #f472b6, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .song-item {
            transition: all 0.25s ease;
        }
        .song-item:hover {
            background: rgba(236, 72, 153, 0.2);
            transform: translateX(4px);
        }
        
        .song-playing {
            background: rgba(168, 85, 247, 0.25);
            border-left: 4px solid #e879f9;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #e879f9, #db2777);
            transition: all 0.3s;
        }
        
        .playlist-tab-active {
            background: linear-gradient(135deg, #c084fc, #e879f9);
            box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
        }
        
        .search-input {
            font-size: 1.05rem;
        }
        
        @media (max-width: 640px) {
            .main-title { font-size: 2.4rem; }
            .glass-modern, .glass-card { padding: 1rem; }
            .main-content { padding-top: 85px; }
        }
    </style>
</head>
<body>
    <!-- 雪花容器 -->
    <div id="snow-container" class="fixed inset-0 pointer-events-none z-10"></div>

    <div class="marquee-container">
        <div class="marquee">
            <span>犯我中华者，虽远必诛！</span>
            <span>犯我中华者，虽远必诛！</span>
        </div>
    </div>

    <div id="app" class="relative z-20 max-w-2xl mx-auto px-4 py-5 main-content">
        <div class="text-center mb-7">
            <div class="inline-block">
                <h1 class="main-title font-black tracking-tighter">二宝子音乐网</h1>
            </div>
            <p class="text-pink-200/80 text-base mt-1">二宝子专属音源 · 无损沉浸聆听</p>
        </div>
        
        <!-- 音源切换栏 -->
        <div class="glass-modern rounded-3xl p-5 mb-6">
            <div class="flex justify-between items-center mb-4">
                <div class="text-white/90 flex items-center gap-2 text-base">
                    <span class="w-2.5 h-2.5 bg-pink-400 rounded-full animate-pulse"></span>
                    音源选择
                </div>
                <button class="px-6 py-2 rounded-2xl font-semibold text-white text-sm playlist-tab-active">
                    👑 二宝子专属
                </button>
            </div>
            
            <div class="flex gap-3">
                <div class="flex-1 relative">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 text-xl">🔍</div>
                    <input v-model="keyword" @keyup.enter="searchMusic" type="text" 
                        placeholder="歌名 / 歌手 / 关键词" 
                        class="search-input w-full pl-12 pr-5 py-3.5 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-white/50 outline-none focus:border-pink-400">
                </div>
                <button @click="searchMusic" :disabled="loading"
                    class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-7 py-3.5 rounded-2xl font-semibold text-white flex items-center justify-center min-w-[110px]">
                    <span v-if="loading" class="loader w-5 h-5 border-2 border-white/30 border-t-white"></span>
                    <span v-else>搜索</span>
                </button>
            </div>
        </div>

        <!-- 当前播放 -->
        <div v-if="currentSong" class="glass-card rounded-3xl p-5 mb-6">
            <div class="flex gap-4">
                <img :src="currentSong.artwork" class="w-20 h-20 rounded-2xl object-cover flex-shrink-0 shadow-md" 
                     @error="currentSong.artwork = defaultCover">
                <div class="flex-1 min-w-0">
                    <div class="font-semibold text-white text-lg leading-tight truncate">{{ currentSong.title }}</div>
                    <div class="text-pink-200/80 text-sm mt-1 truncate">{{ currentSong.artist }}</div>
                    
                    <audio ref="audioPlayer" :src="currentPlayUrl" controls autoplay preload="auto" 
                           class="w-full mt-4 rounded-xl" @error="onPlayError" @canplay="onCanPlay"></audio>
                    
                    <button @click="downloadSong" :disabled="downloading"
                        class="download-btn w-full mt-4 py-3 rounded-2xl font-bold text-white flex items-center justify-center gap-2 text-base">
                        <span v-if="downloading" class="loader w-4 h-4"></span>
                        <span v-else>⬇️ 下载</span>
                    </button>
                </div>
            </div>
            <div v-if="playError" class="text-amber-300 text-xs mt-3 text-center">{{ playError }}</div>
        </div>

        <!-- 标签切换 -->
        <div class="flex gap-2 mb-5">
            <button @click="activeTab = 'search'" 
                    :class="{ 'playlist-tab-active': activeTab === 'search' }"
                    class="flex-1 py-3 rounded-2xl font-medium text-white text-base transition-all">
                搜索结果
            </button>
            <button @click="activeTab = 'playlist'" 
                    :class="{ 'playlist-tab-active': activeTab === 'playlist' }"
                    class="flex-1 py-3 rounded-2xl font-medium text-white text-base transition-all">
                二宝子歌单
            </button>
        </div>

        <!-- 搜索结果 -->
        <div v-if="activeTab === 'search'" class="glass-modern rounded-3xl overflow-hidden mb-8">
            <div class="px-5 py-4 border-b border-white/10 flex justify-between text-white/80 text-sm">
                <span>搜索结果</span>
                <span v-if="songs.length">{{ songs.length }} 首</span>
            </div>
            
            <div v-if="loading && !songs.length" class="p-12 text-center text-white/60">
                <div class="loader mx-auto mb-4"></div>
                搜索中...
            </div>
            
            <div v-else-if="!songs.length" class="p-12 text-center text-white/60">
                输入关键词开始搜索
            </div>
            
            <div v-else class="max-h-[380px] overflow-y-auto song-list divide-y divide-white/10">
                <div v-for="(song, idx) in songs" :key="song.id" @click="playSong(song)"
                    class="song-item p-4 flex items-center gap-4 cursor-pointer">
                    <div class="w-6 text-right text-white/50 font-mono">{{ idx+1 }}</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-medium truncate">{{ song.title }}</div>
                        <div class="text-white/60 text-sm truncate">{{ song.artist }}</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 二宝子歌单 -->
        <div v-if="activeTab === 'playlist'" class="glass-modern rounded-3xl overflow-hidden">
            <div class="px-5 py-4 border-b border-white/10 text-white/80 text-sm">二宝子专属歌单</div>
            <div class="max-h-[420px] overflow-y-auto song-list divide-y divide-white/10">
                <div v-for="(song, idx) in playlist" :key="idx" @click="playLocalSong(song)"
                    class="song-item p-4 flex items-center gap-4 cursor-pointer">
                    <div class="w-6 text-right text-white/50 font-mono">{{ idx+1 }}</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-white font-medium truncate">{{ song.title }}</div>
                        <div class="text-white/60 text-sm">二宝子</div>
                    </div>
                    <button @click.stop="downloadLocalSong(song)" 
                            class="text-xs bg-white/10 hover:bg-white/20 px-4 py-1.5 rounded-xl text-white">
                        下载
                    </button>
                </div>
            </div>
        </div>

        <div class="text-center text-white/30 text-xs mt-8">
            二宝子专属 · 无损音源
        </div>
        
        <!-- 消息提示 -->
        <transition name="fade">
            <div v-if="message" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black/80 backdrop-blur-md text-white px-5 py-2.5 rounded-2xl text-sm z-50">
                {{ message }}
            </div>
        </transition>
    </div>

    <script>
        const { createApp, ref } = Vue;
        
        const PROXY = 'https://proxy.api.030101.xyz/';
        const urlCache = new Map();
        const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
        
        const localPlaylist = [
            { title: "嘎嘎", url: "https://files.catbox.moe/yjarpu.flac" },
            { title: "爱如星火", url: "https://files.catbox.moe/d5bklp.flac" },
            { title: "那一年那一天", url: "https://files.catbox.moe/fawyem.flac" },
            { title: "平凡之路", url: "https://files.catbox.moe/89l1hc.flac" },
            { title: "相濡以沫", url: "https://files.catbox.moe/0oluxu.flac" },
            { title: "不会改变", url: "https://files.catbox.moe/zsgxyr.flac" },
            { title: "朋克万岁", url: "https://files.catbox.moe/k2vbz2.flac" },
            { title: "500公里", url: "https://files.catbox.moe/gjyhqw.flac" },
            { title: "罪人", url: "https://files.catbox.moe/9p209l.flac" },
            { title: "曾经的你", url: "https://files.catbox.moe/6nm44r.flac" },
            { title: "空位", url: "https://streamshare.wireway.ch/download/yt5oyld9" }
        ];
        
        createApp({
            setup() {
                const keyword = ref('');
                const songs = ref([]);
                const loading = ref(false);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const playError = ref('');
                const message = ref('');
                const downloading = ref(false);
                const activeTab = ref('search');
                const playlist = ref(localPlaylist);
                
                const showMsg = (msg) => {
                    message.value = msg;
                    setTimeout(() => message.value = '', 2200);
                };

                // 雪花效果
                const createSnowflakes = () => {
                    const container = document.getElementById('snow-container');
                    for (let i = 0; i < 45; i++) {
                        const flake = document.createElement('div');
                        flake.className = 'snowflake';
                        flake.textContent = Math.random() > 0.5 ? '❄︎' : '❅';
                        flake.style.left = Math.random() * 100 + 'vw';
                        flake.style.animationDuration = (Math.random() * 7 + 9) + 's';
                        flake.style.animationDelay = '-' + Math.random() * 12 + 's';
                        flake.style.fontSize = (Math.random() * 10 + 13) + 'px';
                        container.appendChild(flake);
                        
                        setTimeout(() => flake.remove(), 22000);
                    }
                };

                // 搜索QQ音乐
                async function searchMusicQuery(query) {
                    const postData = { req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 20, page_num: 1, query, search_type: 0 } }};
                    const res = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', postData);
                    const list = res.data?.req_1?.data?.body?.song?.list || [];
                    return list.map(item => ({
                        id: item.id || item.songid,
                        songmid: item.mid || item.songmid,
                        title: item.title || item.songname,
                        artist: item.singer?.map(s => s.name).join("、") || "未知歌手",
                        artwork: item.album?.mid ? `https://y.gtimg.cn/music/photo_new/T002R800x800M000${item.album.mid}.jpg` : defaultCover,
                        duration: item.interval ? `${Math.floor(item.interval/60)}:${(item.interval%60).toString().padStart(2,'0')}` : ''
                    }));
                }

                const searchMusic = async () => {
                    if (!keyword.value.trim()) return showMsg('请输入搜索内容');
                    loading.value = true;
                    songs.value = [];
                    try {
                        songs.value = await searchMusicQuery(keyword.value);
                        if (songs.value.length === 0) showMsg('未找到匹配歌曲');
                    } catch (e) {
                        showMsg('搜索失败，请重试');
                    } finally {
                        loading.value = false;
                    }
                };

                const playSong = async (song) => {
                    currentSong.value = song;
                    playError.value = '';
                    const url = await getPlayUrl(song.songmid);
                    if (url) currentPlayUrl.value = url;
                    else playError.value = '音源加载失败';
                };

                async function getPlayUrl(songmid) {
                    if (urlCache.has(songmid)) return urlCache.get(songmid);
                    try {
                        const res = await axios.get(PROXY + `https://api.xunhuisi.store/API/QQMusic/Song.php?mid=${songmid}`);
                        if (res.data?.code === 200 && res.data.music_url) {
                            urlCache.set(songmid, res.data.music_url);
                            return res.data.music_url;
                        }
                    } catch (e) {}
                    return null;
                }

                const playLocalSong = (song) => {
                    currentSong.value = { title: song.title, artist: '二宝子' };
                    currentPlayUrl.value = song.url;
                };

                const downloadSong = () => {
                    if (!currentPlayUrl.value) return;
                    const a = document.createElement('a');
                    a.href = currentPlayUrl.value;
                    a.download = `${currentSong.value.title}.mp3`;
                    a.click();
                    showMsg('下载已开始');
                };

                const downloadLocalSong = (song) => {
                    const a = document.createElement('a');
                    a.href = song.url;
                    a.download = song.title + '.flac';
                    a.click();
                    showMsg('下载已开始');
                };

                // 初始化
                setTimeout(() => {
                    createSnowflakes();
                    setInterval(createSnowflakes, 7000);
                }, 600);

                return {
                    keyword, songs, loading, currentSong, currentPlayUrl, playError, message, downloading, activeTab, playlist,
                    searchMusic, playSong, playLocalSong, downloadSong, downloadLocalSong, showMsg
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
