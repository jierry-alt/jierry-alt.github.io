<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>二宝子音乐 | 二宝子专属</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(135deg, #3b0764 0%, #6b21a8 40%, #9f1239 75%, #be185d 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* 雪花 */
        .snowflake {
            position: absolute;
            top: -25px;
            color: #f3e8ff;
            font-size: 15px;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: snowfall linear infinite;
            opacity: 0.85;
        }
        @keyframes snowfall { to { transform: translateY(115vh); } }

        /* 跑马灯 */
        .marquee-container {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 11px 0;
            overflow: hidden;
        }
        .marquee {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
            font-size: 15px;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .scroll-container {
            max-height: 420px;   /* 关键：控制滚动区域高度 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;   /* 提升iOS滚动流畅度 */
        }

        .title {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #f472b6, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="snow-container" class="fixed inset-0 pointer-events-none z-10"></div>

    <!-- 跑马灯 -->
    <div class="marquee-container">
        <div class="marquee">
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span>犯我中华者，虽远必诛！&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>
    </div>

    <div id="app" class="relative z-20 max-w-lg mx-auto px-4 pt-16 pb-20">

        <!-- 标题 -->
        <div class="text-center mb-5">
            <h1 class="title">二宝子音乐网</h1>
            <p class="text-purple-200 text-sm mt-1">二宝子专属 · 无损音源</p>
        </div>

        <!-- 音源选择 -->
        <div class="glass rounded-3xl p-5 mb-6">
            <div class="flex items-center gap-2 mb-3 text-purple-200">
                <span class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></span>
                音源选择
            </div>
            <button class="w-full py-4 rounded-2xl font-bold text-lg mb-4 bg-gradient-to-r from-pink-500 to-purple-600">
                👑 二宝子SVIP音源
            </button>

            <div class="flex gap-3">
                <input v-model="keyword" @keyup.enter="searchMusic"
                       type="text" placeholder="输入歌名或歌手"
                       class="flex-1 bg-white/10 border border-white/30 rounded-2xl px-5 py-3.5 text-white placeholder-purple-300 outline-none">
                <button @click="searchMusic" :disabled="loading"
                        class="px-8 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-medium">
                    搜索
                </button>
            </div>
        </div>

        <!-- 当前播放 -->
        <div v-if="currentSong" class="glass rounded-3xl p-5 mb-6">
            <div class="flex gap-4">
                <img :src="currentSong.artwork || defaultCover" class="w-20 h-20 rounded-2xl object-cover" @error="currentSong.artwork = defaultCover">
                <div class="flex-1">
                    <div class="font-semibold text-lg truncate">{{ currentSong.title }}</div>
                    <div class="text-purple-200">{{ currentSong.artist }}</div>
                    <audio :src="currentPlayUrl" controls class="w-full mt-3"></audio>
                </div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="flex bg-white/10 rounded-3xl p-1 mb-5">
            <button @click="activeTab='search'" 
                    :class="activeTab==='search'?'bg-white text-purple-900 font-semibold':'text-white'"
                    class="flex-1 py-3.5 rounded-3xl text-base">搜索结果</button>
            <button @click="activeTab='playlist'" 
                    :class="activeTab==='playlist'?'bg-white text-purple-900 font-semibold':'text-white'"
                    class="flex-1 py-3.5 rounded-3xl text-base">二宝子歌单</button>
        </div>

        <!-- 可滚动内容区域 -->
        <div class="scroll-container glass rounded-3xl overflow-hidden">
            <!-- 搜索结果 -->
            <div v-if="activeTab === 'search'">
                <div class="px-5 py-3 text-xs text-purple-200 border-b border-white/10">搜索结果</div>
                <div v-if="loading" class="py-12 text-center text-purple-300">搜索中...</div>
                <div v-else-if="songs.length === 0" class="py-12 text-center text-purple-300 text-sm">
                    输入关键词搜索音乐
                </div>
                <div v-else class="divide-y divide-white/10">
                    <div v-for="(song,i) in songs" :key="i" @click="playSong(song)"
                         class="px-5 py-4 flex gap-4 cursor-pointer hover:bg-white/10">
                        <span class="text-purple-400 w-5">{{ i+1 }}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-white truncate">{{ song.title }}</div>
                            <div class="text-purple-200 text-sm truncate">{{ song.artist }}</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 二宝子歌单 -->
            <div v-if="activeTab === 'playlist'">
                <div class="px-5 py-3 text-xs text-purple-200 border-b border-white/10">二宝子歌单</div>
                <div class="divide-y divide-white/10">
                    <div v-for="(song,i) in playlist" :key="i" @click="playLocalSong(song)"
                         class="px-5 py-4 flex gap-4 cursor-pointer hover:bg-white/10">
                        <span class="text-purple-400 w-5">{{ i+1 }}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-white truncate">{{ song.title }}</div>
                            <div class="text-purple-200 text-sm">二宝子</div>
                        </div>
                        <button @click.stop="downloadLocalSong(song)" 
                                class="text-xs px-5 py-1 bg-white/10 hover:bg-white/20 rounded-xl">下载</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-purple-300/50 text-xs mt-8">
            二宝子音乐网
        </div>
    </div>
