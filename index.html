<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡ Eternity.✨音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/amplitudejs/5.3.2/amplitude.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #2a1b5e 0%, #1a0b3d 50%, #0a0f2e 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        .snowflake {
            position: fixed;
            top: -30px;
            color: #fff;
            font-size: 1.5em;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.85;
            animation: fall linear infinite, sway 4s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        @keyframes fall { to { transform: translateY(120vh); } }
        @keyframes sway { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(40px); } }
        .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(20px); border: 1px solid rgba(167,139,250,0.3); }
        .song-item:hover { background: rgba(167,139,250,0.25); transform: translateX(6px); }
        .playing { background: rgba(167,139,250,0.35) !important; border-left: 5px solid #c4b5fd; }
    </style>
</head>
<body>

    <div id="snow-container" class="fixed inset-0 pointer-events-none z-[9999]"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 pt-16 pb-12">

        <h1 class="text-5xl font-bold text-center mb-12 bg-gradient-to-r from-violet-300 via-purple-200 to-indigo-300 bg-clip-text text-transparent">
            ♡ Eternity.✨音乐
        </h1>

        <!-- 当前播放信息 -->
        <div class="glass rounded-3xl p-8 mb-10 text-center">
            <img id="cover" src="https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" 
                 class="w-48 h-48 mx-auto rounded-2xl shadow-2xl mb-6 object-cover">
            <h2 id="now-playing" class="text-3xl font-bold">点击歌曲开始播放</h2>
            <p id="now-artist" class="text-xl text-white/75 mt-2">Eternity</p>

            <div class="flex justify-center gap-10 mt-10 text-5xl">
                <button onclick="Amplitude.skipToPrevious()" class="hover:scale-110 transition">⏮</button>
                <button onclick="Amplitude.playPause()" id="play-pause" class="w-20 h-20 flex items-center justify-center bg-gradient-to-br from-violet-500 to-purple-600 rounded-full shadow-2xl hover:scale-110 transition">▶</button>
                <button onclick="Amplitude.skipToNext()" class="hover:scale-110 transition">⏭</button>
            </div>

            <!-- 进度条 -->
            <div class="mt-8 px-4">
                <input type="range" id="progress" class="w-full accent-violet-400" 
                       oninput="Amplitude.setSongPlayedPercentage(this.value)">
            </div>
        </div>

        <!-- 播放列表 -->
        <div class="glass rounded-3xl overflow-hidden">
            <div class="px-6 py-5 border-b border-white/20 bg-black/30 flex justify-between">
                <span class="text-2xl font-semibold">📜 播放列表</span>
            </div>
            <div id="playlist" class="max-h-[420px] overflow-y-auto divide-y divide-white/10">
                <!-- AmplitudeJS 会自动填充 -->
            </div>
        </div>
    </div>

    <script>
        // 你的 11 首歌曲（请把 url 换成稳定直链）
        const songs = [
            { name: "嘎嘎", artist: "Eternity", url: "https://files.catbox.moe/yjarpu.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "爱如星火", artist: "Eternity", url: "https://files.catbox.moe/d5bklp.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "那一年那一天", artist: "Eternity", url: "https://files.catbox.moe/fawyem.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "平凡之路", artist: "Eternity", url: "https://files.catbox.moe/89l1hc.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "相濡以沫", artist: "Eternity", url: "https://files.catbox.moe/0oluxu.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "不会改变", artist: "Eternity", url: "https://files.catbox.moe/zsgxyr.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "朋克万岁", artist: "Eternity", url: "https://files.catbox.moe/k2vbz2.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "500公里", artist: "Eternity", url: "https://files.catbox.moe/gjyhqw.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "罪人", artist: "Eternity", url: "https://files.catbox.moe/9p209l.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "曾经的你", artist: "Eternity", url: "https://files.catbox.moe/6nm44r.flac", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" },
            { name: "空位", artist: "Eternity", url: "https://streamshare.wireway.ch/download/yt5oyld9", cover: "https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg" }
        ];

        // 初始化 AmplitudeJS
        Amplitude.init({
            songs: songs,
            callbacks: {
                songChange: function() {
                    const song = Amplitude.getActiveSongMetadata();
                    document.getElementById('now-playing').textContent = song.name;
                    document.getElementById('now-artist').textContent = song.artist;
                    document.getElementById('cover').src = song.cover || 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';
                }
            }
        });

        // 渲染播放列表
        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            songs.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = `song-item p-5 flex items-center gap-5 cursor-pointer`;
                div.innerHTML = `
                    <div class="w-8 text-white/60 font-mono">${String(index+1).padStart(2, '0')}</div>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold truncate">${song.name}</div>
                        <div class="text-sm text-white/70">${song.artist}</div>
                    </div>
                `;
                div.onclick = () => Amplitude.playSongAtIndex(index);
                container.appendChild(div);
            });
        }

        // 创建雪花
        function createSnowflakes() {
            const container = document.getElementById('snow-container');
            const chars = ['❄︎', '❅', '❆', '✽', '❉', '❋'];
            for (let i = 0; i < 80; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.textContent = chars[Math.floor(Math.random() * chars.length)];
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = (Math.random() * 10 + 12) + 's';
                flake.style.animationDelay = '-' + Math.random() * 25 + 's';
                flake.style.fontSize = (Math.random() * 1.4 + 1.1) + 'em';
                container.appendChild(flake);
            }
        }

        // 初始化
        window.onload = function() {
            createSnowflakes();
            renderPlaylist();
            // 自动播放第一首（可选）
            // Amplitude.playSongAtIndex(0);
        };
    </script>
</body>
</html>
