<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡｡Eternity.✨音乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #2a1b5e 0%, #1a0b3d 50%, #0a0f2e 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }
        /* 雪花样式 - 加强版 */
        .snowflake {
            position: fixed;
            top: -20px;
            color: #fff;
            font-size: 1.4em;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
            animation: fall linear infinite, sway 3s ease-in-out infinite;
            user-select: none;
        }
        @keyframes fall {
            to { transform: translateY(120vh); }
        }
        @keyframes sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(35px); }
        }

        .glass-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(167,139,250,0.25);
        }
        .song-item:hover {
            background: rgba(167,139,250,0.25);
            transform: translateX(6px);
        }
        .playing {
            background: rgba(167,139,250,0.35) !important;
            border-left: 5px solid #c4b5fd;
        }
    </style>
</head>
<body>

    <!-- 雪花容器 -->
    <div id="snow-container" class="fixed inset-0 pointer-events-none z-[9999]"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 pt-12 pb-12">

        <h1 class="text-center text-5xl font-bold mb-10 bg-gradient-to-r from-violet-300 to-fuchsia-200 bg-clip-text text-transparent">
            ♡｡Eternity.✨音乐
        </h1>

        <!-- 当前播放 -->
        <div v-if="currentSong" class="glass-card rounded-3xl p-8 mb-10 text-center">
            <img :src="currentSong.cover" class="w-48 h-48 mx-auto rounded-2xl shadow-2xl mb-6 object-cover" @error="currentSong.cover = defaultCover">
            <h2 class="text-3xl font-bold">{{ currentSong.name }}</h2>
            <p class="text-xl text-white/80 mt-2">{{ currentSong.artist }}</p>
            
            <div class="flex justify-center gap-12 mt-10 text-5xl">
                <button @click="prevSong" class="hover:scale-110 transition">⏮</button>
                <button @click="togglePlay" class="w-20 h-20 flex items-center justify-center bg-gradient-to-br from-violet-500 to-purple-600 rounded-full shadow-2xl hover:scale-110 transition">
                    {{ isPlaying ? '❚❚' : '▶' }}
                </button>
                <button @click="nextSong" class="hover:scale-110 transition">⏭</button>
            </div>
        </div>

        <!-- 播放列表 -->
        <div class="glass-card rounded-3xl overflow-hidden">
            <div class="px-6 py-5 border-b border-white/20 flex justify-between items-center bg-black/30">
                <span class="text-2xl font-semibold">📜 播放列表 ({{ playlist.length }})</span>
                <button @click="clearPlaylist" class="text-red-400 hover:underline">清空</button>
            </div>
            
            <div v-if="playlist.length === 0" class="p-16 text-center text-white/60">
                列表为空
            </div>
            
            <div v-else class="max-h-[460px] overflow-y-auto divide-y divide-white/10">
                <div v-for="(song, i) in playlist" :key="i"
                     @click="playSong(i)"
                     class="song-item p-5 flex items-center gap-5 cursor-pointer"
                     :class="{ playing: i === currentIndex }">
                    <div class="w-8 text-white/60 font-mono">{{ String(i+1).padStart(2, '0') }}</div>
                    <img :src="song.cover" class="w-14 h-14 rounded-xl object-cover" @error="song.cover = defaultCover">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold truncate">{{ song.name }}</div>
                        <div class="text-sm text-white/70">{{ song.artist }}</div>
                    </div>
                    <button @click.stop="removeSong(i)" class="text-white/50 hover:text-red-400 px-3 text-2xl">✕</button>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center text-sm text-white/50">
            测试说明：<br>
            1. 雪花是否出现？<br>
            2. 播放列表是否显示11首歌？<br>
            3. 点击歌曲能否播放？（catbox链接常被屏蔽）
        </div>
    </div>

    <audio ref="audioPlayer" :src="currentPlayUrl" @ended="nextSong" @error="handleError" class="hidden"></audio>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const defaultCover = 'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg';

                const playlist = ref([
                    { id: 1001, name: "嘎嘎", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/yjarpu.flac" },
                    { id: 1002, name: "爱如星火", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/d5bklp.flac" },
                    { id: 1003, name: "那一年那一天", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/fawyem.flac" },
                    { id: 1004, name: "平凡之路", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/89l1hc.flac" },
                    { id: 1005, name: "相濡以沫", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/0oluxu.flac" },
                    { id: 1006, name: "不会改变", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/zsgxyr.flac" },
                    { id: 1007, name: "朋克万岁", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/k2vbz2.flac" },
                    { id: 1008, name: "500公里", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/gjyhqw.flac" },
                    { id: 1009, name: "罪人", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/9p209l.flac" },
                    { id: 1010, name: "曾经的你", artist: "Eternity", cover: defaultCover, url: "https://files.catbox.moe/6nm44r.flac" },
                    { id: 1011, name: "空位", artist: "Eternity", cover: defaultCover, url: "https://streamshare.wireway.ch/download/yt5oyld9" }
                ]);

                const currentIndex = ref(-1);
                const currentSong = ref(null);
                const currentPlayUrl = ref('');
                const isPlaying = ref(false);

                const playSong = (idx) => {
                    currentIndex.value = idx;
                    currentSong.value = playlist.value[idx];
                    currentPlayUrl.value = currentSong.value.url;

                    const audio = document.querySelector('audio');
                    if (audio) {
                        audio.src = currentPlayUrl.value;
                        audio.play().catch(() => {
                            alert(`无法播放：${currentSong.value.name}\n\n链接可能被网络屏蔽（catbox常见问题）`);
                        });
                    }
                };

                const togglePlay = () => {
                    const audio = document.querySelector('audio');
                    if (audio) isPlaying.value ? audio.pause() : audio.play();
                };

                const nextSong = () => {
                    let next = currentIndex.value + 1;
                    if (next >= playlist.value.length) next = 0;
                    playSong(next);
                };

                const prevSong = () => {
                    let prev = currentIndex.value - 1;
                    if (prev < 0) prev = playlist.value.length - 1;
                    playSong(prev);
                };

                const removeSong = (idx) => {
                    if (idx === currentIndex.value) nextSong();
                    playlist.value.splice(idx, 1);
                };

                const clearPlaylist = () => {
                    if (confirm('清空整个播放列表？')) {
                        playlist.value = [];
                        currentSong.value = null;
                    }
                };

                const handleError = () => {
                    alert('播放失败，已尝试跳到下一首');
                    nextSong();
                };

                // 创建雪花（关键加强版）
                const createSnow = () => {
                    const container = document.getElementById('snow-container');
                    if (!container) return;
                    container.innerHTML = ''; // 清空旧的
                    const chars = ['❄︎', '❅', '❆', '✽', '❉', '❋'];
                    for (let i = 0; i < 80; i++) {
                        const flake = document.createElement('div');
                        flake.className = 'snowflake';
                        flake.textContent = chars[Math.floor(Math.random() * chars.length)];
                        flake.style.left = Math.random() * 100 + 'vw';
                        flake.style.animationDuration = (Math.random() * 8 + 10) + 's';
                        flake.style.animationDelay = '-' + (Math.random() * 25) + 's';
                        flake.style.fontSize = (Math.random() * 1.2 + 1.1) + 'em';
                        flake.style.opacity = Math.random() * 0.5 + 0.6;
                        container.appendChild(flake);
                    }
                };

                onMounted(() => {
                    createSnow();
                    // 自动播放第一首
                    setTimeout(() => {
                        if (playlist.value.length > 0) playSong(0);
                    }, 600);
                });

                return {
                    playlist, currentSong, currentPlayUrl, isPlaying, currentIndex,
                    playSong, togglePlay, nextSong, prevSong, removeSong, clearPlaylist, handleError
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
